<!DOCTYPE html>

<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>家具移動管理</title>

```
<style>

    body {
        font-family: sans-serif;
        padding: 20px;
    }

    table {
        border-collapse: collapse;
        width: 100%;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: center;
    }

    th {
        background-color: #f0f0f0;
    }

    select {
        padding: 4px;
    }

    button {
        padding: 4px 8px;
    }

</style>
```

</head>

<body>

```
<h1>家具移動管理</h1>

<table>

    <tr>
        <th>階数</th>
        <th>教室</th>
        <th>団体名</th>
        <th>机移動数</th>
        <th>椅子移動数</th>
        <th>机移動先</th>
        <th>椅子移動先</th>
        <th>状態</th>
        <th>担当者</th>
        <th>更新</th>
    </tr>

    {% for room in rooms %}

    <tr>

        <td>{{ room["階数"] }}</td>
        <td>{{ room["教室"] }}</td>
        <td>{{ room["団体名"] }}</td>

        <td>
            {{
                room["机α（移動数）"] +
                room["机β（移動数）"]
            }}
        </td>

        <td>{{ room["椅子（移動数）"] }}</td>

        <td>{{ room["机移動先"] }}</td>

        <td>{{ room["椅子移動先"] }}</td>

        <td>{{ room["状態"] }}</td>

        <td>{{ room["担当者"] }}</td>

        <td>

            <form action="/update_status" method="post">

                <input
                    type="hidden"
                    name="room_id"
                    value="{{ room['id'] }}"
                >

                <select name="status">

                    <option value="未着手">
                        未着手
                    </option>

                    <option value="移動中">
                        移動中
                    </option>

                    <option value="完了">
                        完了
                    </option>

                </select>

                <button type="submit">
                    更新
                </button>

            </form>

        </td>

    </tr>

    {% endfor %}

</table>
```

</body>

</html>
